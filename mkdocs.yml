site_name: "RAG Enterprise Scale"
site_description: "Architecture and implementation patterns for enterprise-scale RAG solutions."
site_url: https://cloud2br-tec.github.io/ai-academy-103-rag/
docs_dir: docs

copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - 01. Fundamentals:
    - Enterprise RAG Overview: 01-fundamentals/index.md
  - 02. Implementation Catalog:
    - Overview: 02-catalog/index.md
    - Azure GPT-RAG: 02-catalog/gpt-rag.md
    - Customer Chatbot Accelerator: 02-catalog/customer-chatbot.md
    - Multi-Agent Automation Engine: 02-catalog/multi-agent-automation.md
    - Microsoft AI Solution Accelerators: 02-catalog/microsoft-ai-accelerators.md
    - Microsoft IQ Accelerator: 02-catalog/microsoft-iq.md
    - Content Generation Accelerator: 02-catalog/content-generation.md
    - Container Migration Accelerator: 02-catalog/container-migration.md
    - Content Processing Accelerator: 02-catalog/content-processing.md
    - Modernize Your Code Accelerator: 02-catalog/modernize-code.md
    - Document Knowledge Mining: 02-catalog/document-knowledge-mining.md
    - Conversation Knowledge Mining: 02-catalog/conversation-mining.md
    - Deploy AI in Production: 02-catalog/deploy-ai-production.md
    - Chat with Your Data: 02-catalog/chat-with-data.md
  - 03. Enterprise Design:
    - Architecture Patterns: 03-enterprise-design/architecture-patterns.md
    - Governance and Security: 03-enterprise-design/governance-security.md
  - 04. Security:
    - Zero Trust Architecture: 04-security/index.md