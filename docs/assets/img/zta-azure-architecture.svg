<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#004a99"/>
    </marker>
    <marker id="arrs" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7ba9d6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" fill="#f7fafd" rx="14"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="46" fill="#003366" rx="14"/>
  <rect x="0" y="32" width="960" height="14" fill="#003366"/>
  <text x="480" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Zero Trust — Azure Architecture for RAG</text>

  <!-- ===== EXTERNAL ZONE LABEL ===== -->
  <text x="32" y="68" font-family="Arial, sans-serif" font-size="11" fill="#7ba9d6" font-style="italic">External</text>

  <!-- User -->
  <rect x="30" y="78" width="110" height="64" rx="8" fill="#526072"/>
  <text x="85" y="105" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">User</text>
  <text x="85" y="123" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Internet</text>

  <!-- Arrow User → FD -->
  <line x1="140" y1="110" x2="176" y2="110" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>
  <text x="158" y="102" font-family="Arial, sans-serif" font-size="10" fill="#004a99" text-anchor="middle">HTTPS</text>

  <!-- Front Door + WAF -->
  <rect x="176" y="65" width="148" height="92" rx="8" fill="#004a99"/>
  <text x="250" y="102" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Front Door</text>
  <text x="250" y="120" font-family="Arial, sans-serif" font-size="12" fill="#c8d8ea" text-anchor="middle">+ WAF</text>
  <text x="250" y="144" font-family="Arial, sans-serif" font-size="10" fill="#7ba9d6" text-anchor="middle">OWASP · DDoS</text>

  <!-- Auth redirect line FD ↔ Entra -->
  <line x1="324" y1="90" x2="386" y2="62" stroke="#7ba9d6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrs)"/>
  <text x="352" y="65" font-family="Arial, sans-serif" font-size="10" fill="#7ba9d6" text-anchor="middle">Auth</text>

  <!-- Entra ID box (floating, dashed border = cloud service) -->
  <rect x="384" y="30" width="184" height="76" rx="8" fill="rgba(0,74,153,0.06)" stroke="#7ba9d6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="476" y="58" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#003366" text-anchor="middle">Microsoft Entra ID</text>
  <text x="476" y="76" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Conditional Access · MFA · PIM</text>
  <text x="476" y="94" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Managed Identity · JIT</text>

  <!-- Token back to FD -->
  <line x1="384" y1="85" x2="324" y2="104" stroke="#7ba9d6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrs)"/>
  <text x="350" y="104" font-family="Arial, sans-serif" font-size="10" fill="#7ba9d6" text-anchor="middle">Token</text>

  <!-- Arrow FD → VNet (Private Link) -->
  <line x1="250" y1="157" x2="250" y2="193" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>
  <text x="272" y="178" font-family="Arial, sans-serif" font-size="10" fill="#004a99">Private Link</text>

  <!-- ===== VNet CONTAINER ===== -->
  <rect x="30" y="193" width="900" height="350" rx="14" fill="rgba(0,74,153,0.03)" stroke="#004a99" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="50" y="216" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#004a99">Virtual Network (VNet)</text>

  <!-- App Subnet box -->
  <rect x="48" y="228" width="245" height="298" rx="10" fill="rgba(0,74,153,0.07)" stroke="#7ba9d6" stroke-width="1.5"/>
  <text x="170" y="250" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle" font-style="italic">App Subnet</text>

  <!-- App Service -->
  <rect x="64" y="260" width="214" height="60" rx="7" fill="#004a99"/>
  <text x="171" y="286" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">App Service</text>
  <text x="171" y="304" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Frontend · Private Endpoint</text>

  <!-- Arrow App Service → Orchestrator -->
  <line x1="171" y1="320" x2="171" y2="356" stroke="#7ba9d6" stroke-width="1.5" marker-end="url(#arrs)"/>

  <!-- Orchestrator (Function) -->
  <rect x="64" y="356" width="214" height="72" rx="7" fill="#003366"/>
  <text x="171" y="382" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Orchestrator</text>
  <text x="171" y="400" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Azure Function</text>
  <text x="171" y="418" font-family="Arial, sans-serif" font-size="10" fill="#7ba9d6" text-anchor="middle">Managed Identity · No stored creds</text>

  <!-- Arrow Orchestrator → AI Subnet -->
  <line x1="278" y1="392" x2="318" y2="392" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AI Services Subnet box -->
  <rect x="314" y="228" width="598" height="298" rx="10" fill="rgba(0,51,102,0.05)" stroke="#7ba9d6" stroke-width="1.5"/>
  <text x="613" y="250" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle" font-style="italic">AI Services Subnet — all services behind Private Endpoints, no public internet access</text>

  <!-- Azure AI Search -->
  <rect x="330" y="264" width="275" height="60" rx="7" fill="#004a99"/>
  <text x="468" y="290" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Azure AI Search</text>
  <text x="468" y="308" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">&#128274; Private Endpoint · Vector + Keyword</text>

  <!-- Azure OpenAI -->
  <rect x="625" y="264" width="268" height="60" rx="7" fill="#003366"/>
  <text x="759" y="290" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Azure OpenAI</text>
  <text x="759" y="308" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">&#128274; Private Endpoint · LLM Generation</text>

  <!-- Cosmos DB -->
  <rect x="330" y="348" width="275" height="60" rx="7" fill="#003366"/>
  <text x="468" y="374" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Cosmos DB</text>
  <text x="468" y="392" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">&#128274; Private Endpoint · Chat History</text>

  <!-- Azure Key Vault -->
  <rect x="625" y="348" width="268" height="60" rx="7" fill="#004a99"/>
  <text x="759" y="374" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Azure Key Vault</text>
  <text x="759" y="392" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">&#128274; Private Endpoint · Secrets + Certs</text>

  <!-- NSG bar at bottom -->
  <rect x="330" y="430" width="563" height="36" rx="7" fill="rgba(200,216,234,0.3)" stroke="#c8d8ea" stroke-width="1"/>
  <text x="612" y="452" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Network Security Groups (NSGs) — explicit allow rules per subnet, deny all by default</text>

  <!-- Azure Monitor + Sentinel footer -->
  <rect x="48" y="440" width="245" height="36" rx="7" fill="rgba(200,216,234,0.2)" stroke="#c8d8ea" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="170" y="462" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Azure Monitor · Microsoft Sentinel</text>
</svg>
