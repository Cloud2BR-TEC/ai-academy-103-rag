<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <!-- Background -->
  <rect width="900" height="400" fill="#f7fafd" rx="14"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="46" fill="#003366" rx="14"/>
  <rect x="0" y="32" width="900" height="14" fill="#003366"/>
  <text x="450" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Zero Trust — Adoption Maturity</text>

  <!-- Arrow between stages -->
  <!-- Arrow 1: Traditional → Advanced -->
  <line x1="296" y1="200" x2="326" y2="200" stroke="#004a99" stroke-width="2.5"/>
  <polygon points="322,194 334,200 322,206" fill="#004a99"/>
  <!-- Arrow 2: Advanced → Optimal -->
  <line x1="586" y1="200" x2="616" y2="200" stroke="#004a99" stroke-width="2.5"/>
  <polygon points="612,194 624,200 612,206" fill="#004a99"/>

  <!-- Stage 1: Traditional -->
  <rect x="24" y="62" width="270" height="316" rx="12" fill="#526072"/>
  <!-- Stage label -->
  <rect x="24" y="62" width="270" height="46" rx="12" fill="#3d4f5e"/>
  <rect x="24" y="90" width="270" height="18" fill="#3d4f5e"/>
  <text x="159" y="90" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Traditional</text>
  <!-- Dividers and content -->
  <rect x="44" y="122" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="159" y="116" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Identity</text>
  <text x="159" y="138" font-family="Arial, sans-serif" font-size="12" fill="#d4dde6" text-anchor="middle">Password-only auth</text>
  <text x="159" y="156" font-family="Arial, sans-serif" font-size="12" fill="#d4dde6" text-anchor="middle">Broad role assignments</text>
  <rect x="44" y="172" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="159" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Network</text>
  <text x="159" y="184" font-family="Arial, sans-serif" font-size="12" fill="#d4dde6" text-anchor="middle">VPN + perimeter firewall</text>
  <text x="159" y="202" font-family="Arial, sans-serif" font-size="12" fill="#d4dde6" text-anchor="middle">Flat network topology</text>
  <rect x="44" y="218" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="159" y="214" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Data</text>
  <text x="159" y="230" font-family="Arial, sans-serif" font-size="12" fill="#d4dde6" text-anchor="middle">Unclassified, minimal encryption</text>
  <rect x="44" y="248" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="159" y="244" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Monitoring</text>
  <text x="159" y="260" font-family="Arial, sans-serif" font-size="12" fill="#d4dde6" text-anchor="middle">Basic logs, reactive response</text>
  <text x="159" y="278" font-family="Arial, sans-serif" font-size="12" fill="#d4dde6" text-anchor="middle">No unified SIEM</text>
  <rect x="44" y="318" width="230" height="40" rx="6" fill="rgba(0,0,0,0.15)"/>
  <text x="159" y="342" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Trust the network boundary</text>

  <!-- Stage 2: Advanced -->
  <rect x="314" y="62" width="270" height="316" rx="12" fill="#003878"/>
  <rect x="314" y="62" width="270" height="46" rx="12" fill="#003366"/>
  <rect x="314" y="90" width="270" height="18" fill="#003366"/>
  <text x="449" y="90" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Advanced</text>
  <rect x="334" y="122" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="449" y="116" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7ba9d6" text-anchor="middle">Identity</text>
  <text x="449" y="138" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">MFA enforced</text>
  <text x="449" y="156" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Some Conditional Access policies</text>
  <rect x="334" y="172" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="449" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7ba9d6" text-anchor="middle">Network</text>
  <text x="449" y="184" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Some segmentation</text>
  <text x="449" y="202" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Private Endpoints for key services</text>
  <rect x="334" y="218" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="449" y="214" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7ba9d6" text-anchor="middle">Data</text>
  <text x="449" y="230" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Labels on key data, enc. in transit</text>
  <rect x="334" y="248" width="230" height="1" fill="rgba(255,255,255,0.2)"/>
  <text x="449" y="244" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7ba9d6" text-anchor="middle">Monitoring</text>
  <text x="449" y="260" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Centralized logs</text>
  <text x="449" y="278" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Basic alerting configured</text>
  <rect x="334" y="318" width="230" height="40" rx="6" fill="rgba(0,0,0,0.15)"/>
  <text x="449" y="342" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Trust identity, not location</text>

  <!-- Stage 3: Optimal -->
  <rect x="604" y="62" width="270" height="316" rx="12" fill="#004a99"/>
  <rect x="604" y="62" width="270" height="46" rx="12" fill="#004a99"/>
  <rect x="604" y="90" width="270" height="18" fill="#004a99"/>
  <text x="739" y="90" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Optimal</text>
  <rect x="624" y="122" width="230" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="739" y="116" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Identity</text>
  <text x="739" y="138" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Passwordless, JIT/PIM enforced</text>
  <text x="739" y="156" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Full Conditional Access coverage</text>
  <rect x="624" y="172" width="230" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="739" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Network</text>
  <text x="739" y="184" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Full micro-segmentation</text>
  <text x="739" y="202" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">All services on Private Endpoints</text>
  <rect x="624" y="218" width="230" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="739" y="214" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Data</text>
  <text x="739" y="230" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">All data classified + labeled</text>
  <text x="739" y="248" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">DLP enforced everywhere</text>
  <rect x="624" y="264" width="230" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="739" y="260" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c8d8ea" text-anchor="middle">Monitoring</text>
  <text x="739" y="276" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Real-time threat detection</text>
  <text x="739" y="294" font-family="Arial, sans-serif" font-size="12" fill="#b8d0ec" text-anchor="middle">Automated response via Sentinel</text>
  <rect x="624" y="318" width="230" height="40" rx="6" fill="rgba(0,0,0,0.15)"/>
  <text x="739" y="342" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Verify everything, trust nothing</text>
</svg>
