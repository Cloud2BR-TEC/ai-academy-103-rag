<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#004a99"/>
    </marker>
    <marker id="arrd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7ba9d6"/>
    </marker>
  </defs>
  <rect width="900" height="270" fill="#f7fafd" rx="14"/>
  <rect x="0" y="0" width="900" height="46" fill="#003366" rx="14"/>
  <rect x="0" y="32" width="900" height="14" fill="#003366"/>
  <text x="450" y="26" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">Multi-Agent Custom Automation Engine</text>
  <!-- User Task -->
  <rect x="30" y="100" width="150" height="80" rx="9" fill="#526072"/>
  <text x="105" y="132" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">User Task</text>
  <text x="105" y="152" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Goal + context input</text>
  <line x1="180" y1="140" x2="210" y2="140" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Orchestrator -->
  <rect x="210" y="80" width="170" height="120" rx="9" fill="#003366"/>
  <text x="295" y="118" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Orchestrator</text>
  <text x="295" y="138" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Agent Framework</text>
  <text x="295" y="156" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Azure Foundry</text>
  <text x="295" y="174" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Cosmos DB State</text>
  <!-- 3 agents -->
  <line x1="380" y1="108" x2="430" y2="80" stroke="#7ba9d6" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="380" y1="140" x2="430" y2="140" stroke="#7ba9d6" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="380" y1="172" x2="430" y2="198" stroke="#7ba9d6" stroke-width="1.5" marker-end="url(#arrd)"/>
  <rect x="430" y="56" width="160" height="52" rx="7" fill="#004a99"/>
  <text x="510" y="79" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Research Agent</text>
  <text x="510" y="97" font-family="Arial,sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">Context retrieval</text>
  <rect x="430" y="118" width="160" height="52" rx="7" fill="#003878"/>
  <text x="510" y="141" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Execution Agent</text>
  <text x="510" y="159" font-family="Arial,sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">Task execution</text>
  <rect x="430" y="180" width="160" height="52" rx="7" fill="#004a99"/>
  <text x="510" y="203" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Validator Agent</text>
  <text x="510" y="221" font-family="Arial,sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">Quality + safety check</text>
  <!-- Result -->
  <line x1="590" y1="140" x2="620" y2="140" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="620" y="100" width="250" height="80" rx="9" fill="#003366"/>
  <text x="745" y="132" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Automated Outcome</text>
  <text x="745" y="152" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Task complete · Results delivered</text>
</svg>
