<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1f3a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="640" rx="18" fill="url(#bg)"/>

  <text x="40" y="52" font-size="30" font-weight="700" fill="#0b1f3a">Implementation Catalog - Summarized View</text>
  <text x="40" y="82" font-size="16" fill="#5a6b82">13 Microsoft &amp; Azure accelerators grouped by capability</text>

  <!-- Category 1: RAG & Chat -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="360" height="150" rx="12" fill="#ffffff"/>
    <rect x="40" y="110" width="360" height="40" rx="12" fill="#1f6feb"/>
    <rect x="40" y="135" width="360" height="15" fill="#1f6feb"/>
    <text x="60" y="136" font-size="17" font-weight="700" fill="#ffffff">RAG &amp; Conversational</text>
    <circle cx="66" cy="176" r="5" fill="#1f6feb"/><text x="82" y="181" font-size="14" fill="#233">Azure GPT-RAG</text>
    <circle cx="66" cy="204" r="5" fill="#1f6feb"/><text x="82" y="209" font-size="14" fill="#233">Chat with Your Data</text>
    <circle cx="66" cy="232" r="5" fill="#1f6feb"/><text x="82" y="237" font-size="14" fill="#233">Customer Chatbot</text>
  </g>

  <!-- Category 2: Agents & Automation -->
  <g filter="url(#shadow)">
    <rect x="420" y="110" width="360" height="150" rx="12" fill="#ffffff"/>
    <rect x="420" y="110" width="360" height="40" rx="12" fill="#8250df"/>
    <rect x="420" y="135" width="360" height="15" fill="#8250df"/>
    <text x="440" y="136" font-size="17" font-weight="700" fill="#ffffff">Agents &amp; Automation</text>
    <circle cx="446" cy="176" r="5" fill="#8250df"/><text x="462" y="181" font-size="14" fill="#233">Multi-Agent Automation Engine</text>
    <circle cx="446" cy="204" r="5" fill="#8250df"/><text x="462" y="209" font-size="14" fill="#233">Content Generation</text>
  </g>

  <!-- Category 3: Knowledge Mining -->
  <g filter="url(#shadow)">
    <rect x="800" y="110" width="360" height="150" rx="12" fill="#ffffff"/>
    <rect x="800" y="110" width="360" height="40" rx="12" fill="#1a7f64"/>
    <rect x="800" y="135" width="360" height="15" fill="#1a7f64"/>
    <text x="820" y="136" font-size="17" font-weight="700" fill="#ffffff">Knowledge Mining</text>
    <circle cx="826" cy="176" r="5" fill="#1a7f64"/><text x="842" y="181" font-size="14" fill="#233">Document Knowledge Mining</text>
    <circle cx="826" cy="204" r="5" fill="#1a7f64"/><text x="842" y="209" font-size="14" fill="#233">Conversation Knowledge Mining</text>
    <circle cx="826" cy="232" r="5" fill="#1a7f64"/><text x="842" y="237" font-size="14" fill="#233">Content Processing</text>
  </g>

  <!-- Category 4: Modernization & Migration -->
  <g filter="url(#shadow)">
    <rect x="220" y="300" width="360" height="130" rx="12" fill="#ffffff"/>
    <rect x="220" y="300" width="360" height="40" rx="12" fill="#bc4c00"/>
    <rect x="220" y="325" width="360" height="15" fill="#bc4c00"/>
    <text x="240" y="326" font-size="17" font-weight="700" fill="#ffffff">Modernization &amp; Migration</text>
    <circle cx="246" cy="366" r="5" fill="#bc4c00"/><text x="262" y="371" font-size="14" fill="#233">Modernize Your Code</text>
    <circle cx="246" cy="394" r="5" fill="#bc4c00"/><text x="262" y="399" font-size="14" fill="#233">Container Migration</text>
  </g>

  <!-- Category 5: Platform & Production -->
  <g filter="url(#shadow)">
    <rect x="620" y="300" width="360" height="130" rx="12" fill="#ffffff"/>
    <rect x="620" y="300" width="360" height="40" rx="12" fill="#0b1f3a"/>
    <rect x="620" y="325" width="360" height="15" fill="#0b1f3a"/>
    <text x="640" y="326" font-size="17" font-weight="700" fill="#ffffff">Platform &amp; Production</text>
    <circle cx="646" cy="366" r="5" fill="#0b1f3a"/><text x="662" y="371" font-size="14" fill="#233">Microsoft AI Solution Accelerators</text>
    <circle cx="646" cy="394" r="5" fill="#0b1f3a"/><text x="662" y="399" font-size="14" fill="#233">Deploy AI in Production</text>
  </g>

  <!-- Unified layer: Microsoft IQ -->
  <g filter="url(#shadow)">
    <rect x="40" y="470" width="1120" height="120" rx="12" fill="#ffffff"/>
    <rect x="40" y="470" width="12" height="120" rx="6" fill="#d29922"/>
    <text x="70" y="512" font-size="18" font-weight="700" fill="#0b1f3a">Microsoft IQ Solution Accelerator</text>
    <text x="70" y="540" font-size="14" fill="#5a6b82">Unified intelligence layer connecting enterprise data, knowledge, and decisions across all</text>
    <text x="70" y="562" font-size="14" fill="#5a6b82">of the accelerators above.</text>
  </g>
</svg>
