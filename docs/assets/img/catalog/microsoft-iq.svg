<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <rect width="900" height="220" fill="#f7fafd" rx="14"/>
  <rect x="0" y="0" width="900" height="46" fill="#003366" rx="14"/>
  <rect x="0" y="32" width="900" height="14" fill="#003366"/>
  <text x="450" y="26" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">Microsoft IQ Solution Accelerator — Unified Intelligence Layer</text>
  <!-- Work IQ -->
  <rect x="30" y="64" width="242" height="118" rx="9" fill="#004a99"/>
  <text x="151" y="100" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Work IQ</text>
  <rect x="60" y="112" width="182" height="1" fill="rgba(255,255,255,0.22)"/>
