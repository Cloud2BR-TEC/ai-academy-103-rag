  <rect x="572" y="112" width="182" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="663" y="130" font-family="Arial,sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Microsoft Fabric analytics</text>
  <text x="663" y="148" font-family="Arial,sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Data + reporting layer</text>
  <!-- Unified label -->
  <rect x="200" y="190" width="500" height="22" rx="7" fill="rgba(0,74,153,0.10)" stroke="#c8d8ea"/>
  <text x="450" y="204" font-family="Arial,sans-serif" font-size="11" fill="#003366" text-anchor="middle" font-weight="bold">Single unified intelligence layer across all enterprise data and decisions</text>
