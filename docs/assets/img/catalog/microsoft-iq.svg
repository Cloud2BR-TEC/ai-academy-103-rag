  <text x="151" y="148" font-family="Arial,sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Productivity intelligence</text>
  <!-- Foundry IQ -->
  <rect x="286" y="64" width="242" height="118" rx="9" fill="#003366"/>
  <text x="407" y="100" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Foundry IQ</text>
  <rect x="316" y="112" width="182" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="407" y="130" font-family="Arial,sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Azure AI Foundry agents</text>
  <text x="407" y="148" font-family="Arial,sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Reasoning + knowledge layer</text>
  <!-- Fabric IQ -->
  <rect x="542" y="64" width="242" height="118" rx="9" fill="#003878"/>
