<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#f7fafd" rx="14"/>
  <rect x="0" y="0" width="900" height="46" fill="#003366" rx="14"/>
  <rect x="0" y="32" width="900" height="14" fill="#003366"/>
  <text x="450" y="26" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">Deploy Your AI Application in Production — Security Architecture</text>
  <!-- Layer 1: Edge -->
  <rect x="30" y="58" width="840" height="38" rx="7" fill="#526072"/>
  <text x="450" y="80" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Edge Layer — Azure Front Door + WAF · DDoS Protection · TLS Termination</text>
  <!-- Layer 2: Identity -->
  <rect x="30" y="104" width="840" height="38" rx="7" fill="#004a99"/>
  <text x="450" y="126" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Identity Layer — Microsoft Entra ID · Conditional Access · MFA · Managed Identity</text>
  <!-- Layer 3: Network -->
  <rect x="30" y="150" width="840" height="38" rx="7" fill="#003366"/>
  <text x="450" y="172" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Network Layer — VNet · Private Endpoints · NSGs · Azure Firewall · Zero Trust</text>
  <!-- Layer 4: AI Services -->
  <rect x="30" y="196" width="840" height="38" rx="7" fill="#003878"/>
  <text x="450" y="218" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">AI Services — Azure Foundry · Azure OpenAI · AI Search · Key Vault · Cosmos DB</text>
  <!-- Layer 5: Observability -->
  <rect x="30" y="242" width="840" height="30" rx="7" fill="rgba(0,74,153,0.15)" stroke="#c8d8ea"/>
  <text x="450" y="260" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#003366" text-anchor="middle">Observability — Azure Monitor · Application Insights · Sentinel SIEM · WAF Alerts</text>
</svg>
