  <text x="450" y="26" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">Azure GPT-RAG — Enterprise Retrieval-Augmented Generation</text>
  <!-- Box 1 -->
  <rect x="30" y="64" width="168" height="118" rx="9" fill="#526072"/>
