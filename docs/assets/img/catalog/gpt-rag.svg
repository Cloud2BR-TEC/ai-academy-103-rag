<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#004a99"/>
    </marker>
  </defs>
  <rect width="900" height="220" fill="#f7fafd" rx="14"/>
  <rect x="0" y="0" width="900" height="46" fill="#003366" rx="14"/>
