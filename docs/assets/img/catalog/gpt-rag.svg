  <text x="114" y="120" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Documents · SharePoint</text>
  <text x="114" y="138" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Databases · APIs</text>
  <!-- Arrow -->
  <line x1="198" y1="123" x2="226" y2="123" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Box 2 -->
  <rect x="226" y="64" width="168" height="118" rx="9" fill="#004a99"/>
  <text x="310" y="100" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Ingestion Pipeline</text>
  <text x="310" y="120" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Chunking · Embedding</text>
  <text x="310" y="138" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Vector Generation</text>
  <!-- Arrow -->
  <line x1="394" y1="123" x2="422" y2="123" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Box 3 -->
  <rect x="422" y="64" width="168" height="118" rx="9" fill="#003366"/>
  <text x="506" y="100" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Azure AI Search</text>
  <text x="506" y="120" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Vector + Keyword</text>
  <text x="506" y="138" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Hybrid Retrieval</text>
  <!-- Arrow -->
  <line x1="590" y1="123" x2="618" y2="123" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Box 4 -->
  <rect x="618" y="64" width="168" height="118" rx="9" fill="#003878"/>
  <text x="702" y="100" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Azure OpenAI</text>
  <text x="702" y="120" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Grounded Response</text>
  <text x="702" y="138" font-family="Arial,sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">ChatGPT-style Q&amp;A</text>
  <!-- Result label -->
  <rect x="618" y="190" width="168" height="22" rx="5" fill="rgba(0,74,153,0.12)" stroke="#c8d8ea"/>
  <text x="702" y="204" font-family="Arial,sans-serif" font-size="10" fill="#526072" text-anchor="middle">Secure · Private · Enterprise-ready</text>
