<svg xmlns="http://www.w3.org/2000/svg" width="960" height="310" viewBox="0 0 960 310">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#004a99"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="310" fill="#f7fafd" rx="14"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="46" fill="#003366" rx="14"/>
  <rect x="0" y="32" width="960" height="14" fill="#003366"/>
  <text x="480" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">Cloud Adoption Framework (CAF) — Seven Methodologies</text>

  <!-- Section label: Foundational (sequential) -->
  <text x="20" y="68" font-family="Arial, sans-serif" font-size="11" fill="#7ba9d6" font-style="italic">Foundational (sequential)</text>

  <!-- Phase 1: Strategy -->
  <rect x="20" y="78" width="170" height="114" rx="10" fill="#004a99"/>
  <text x="105" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">1. Strategy</text>
  <rect x="45" y="118" width="120" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="105" y="136" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Define business goals</text>
  <text x="105" y="153" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Map cloud outcomes</text>
  <text x="105" y="170" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Build the business case</text>

  <line x1="190" y1="135" x2="208" y2="135" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: Plan -->
  <rect x="208" y="78" width="155" height="114" rx="10" fill="#003878"/>
  <text x="285" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">2. Plan</text>
  <rect x="228" y="118" width="115" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="285" y="136" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Operating model</text>
  <text x="285" y="153" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Skills &amp; migration plan</text>
  <text x="285" y="170" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Cloud cost estimation</text>

  <line x1="363" y1="135" x2="381" y2="135" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: Ready -->
  <rect x="381" y="78" width="155" height="114" rx="10" fill="#004a99"/>
  <text x="458" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">3. Ready</text>
  <rect x="401" y="118" width="115" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="458" y="136" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Landing zones</text>
  <text x="458" y="153" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Azure tenant setup</text>
  <text x="458" y="170" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Platform foundations</text>

  <line x1="536" y1="135" x2="554" y2="135" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 4: Adopt -->
  <rect x="554" y="78" width="155" height="114" rx="10" fill="#003878"/>
  <text x="631" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">4. Adopt</text>
  <rect x="574" y="118" width="115" height="1" fill="rgba(255,255,255,0.22)"/>
  <text x="631" y="136" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Migrate workloads</text>
  <text x="631" y="153" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Modernize apps</text>
  <text x="631" y="170" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Build cloud-native</text>

  <!-- Section label: Operational (parallel) -->
  <text x="728" y="68" font-family="Arial, sans-serif" font-size="11" fill="#7ba9d6" font-style="italic">Operational (parallel)</text>

  <!-- Phase 5: Govern -->
  <rect x="728" y="78" width="72" height="114" rx="10" fill="#004a99"/>
  <text x="764" y="118" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">5.</text>
  <text x="764" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Govern</text>
  <text x="764" y="158" font-family="Arial, sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">Risk</text>
  <text x="764" y="172" font-family="Arial, sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">controls</text>

  <!-- Phase 6: Secure -->
  <rect x="808" y="78" width="72" height="114" rx="10" fill="#003366"/>
  <text x="844" y="118" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">6.</text>
  <text x="844" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Secure</text>
  <text x="844" y="158" font-family="Arial, sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">Security</text>
  <text x="844" y="172" font-family="Arial, sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">posture</text>

  <!-- Phase 7: Manage -->
  <rect x="888" y="78" width="52" height="114" rx="10" fill="#003878"/>
  <text x="914" y="118" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">7.</text>
  <text x="914" y="136" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Mgmt</text>
  <text x="914" y="158" font-family="Arial, sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">Day-2</text>
  <text x="914" y="172" font-family="Arial, sans-serif" font-size="10" fill="#b8d0ec" text-anchor="middle">ops</text>

  <!-- RAG application row at bottom -->
  <rect x="20" y="210" width="920" height="78" rx="10" fill="rgba(0,74,153,0.06)" stroke="#c8d8ea" stroke-width="1"/>
  <text x="480" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#003366" text-anchor="middle">Applied to Enterprise RAG</text>
  <text x="100" y="254" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Define AI KPIs</text>
  <text x="265" y="254" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">AI skills roadmap</text>
  <text x="436" y="254" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">AI Landing Zone</text>
  <text x="609" y="254" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Deploy RAG solution</text>
  <text x="764" y="254" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">AI Policy</text>
  <text x="844" y="254" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">ZTA</text>
  <text x="914" y="254" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Ops</text>
  <text x="480" y="276" font-family="Arial, sans-serif" font-size="11" fill="#7ba9d6" text-anchor="middle">CAF AI Scenario: https://learn.microsoft.com/azure/cloud-adoption-framework/ai/strategy</text>
</svg>
