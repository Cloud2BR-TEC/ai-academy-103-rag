<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="gsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1f3a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="700" rx="18" fill="url(#gbg)"/>
  <text x="40" y="52" font-size="30" font-weight="700" fill="#0b1f3a">Governance &amp; Security - Layered View</text>
  <text x="40" y="82" font-size="16" fill="#5a6b82">Defense in depth across Microsoft Azure and GitHub, aligned to Zero Trust</text>

  <!-- Governance top band -->
  <g filter="url(#gsh)">
    <rect x="40" y="110" width="1120" height="70" rx="12" fill="#0b1f3a"/>
    <text x="60" y="142" font-size="17" font-weight="700" fill="#ffffff">Governance</text>
    <text x="60" y="166" font-size="13" fill="#c7d2e0">Azure Policy · Management Groups · RBAC · Landing Zones · Cost Management · Purview · Compliance Manager</text>
  </g>

  <!-- Defense in depth layers -->
  <g filter="url(#gsh)">
    <rect x="40" y="196" width="546" height="70" rx="12" fill="#ffffff"/>
    <rect x="40" y="196" width="10" height="70" rx="5" fill="#1f6feb"/>
    <text x="66" y="226" font-size="16" font-weight="700" fill="#1f6feb">Identity</text>
    <text x="66" y="250" font-size="13" fill="#33445a">Entra ID · Conditional Access · MFA · PIM · Managed Identities</text>
  </g>
  <g filter="url(#gsh)">
    <rect x="614" y="196" width="546" height="70" rx="12" fill="#ffffff"/>
    <rect x="614" y="196" width="10" height="70" rx="5" fill="#1a7f64"/>
    <text x="640" y="226" font-size="16" font-weight="700" fill="#1a7f64">Network</text>
    <text x="640" y="250" font-size="13" fill="#33445a">Private Endpoints · Azure Firewall · WAF · NSG · DDoS Protection</text>
  </g>
  <g filter="url(#gsh)">
    <rect x="40" y="282" width="546" height="70" rx="12" fill="#ffffff"/>
    <rect x="40" y="282" width="10" height="70" rx="5" fill="#8250df"/>
    <text x="66" y="312" font-size="16" font-weight="700" fill="#8250df">Data</text>
    <text x="66" y="336" font-size="13" fill="#33445a">Key Vault · Encryption · Purview DLP · Sensitivity Labels</text>
  </g>
  <g filter="url(#gsh)">
    <rect x="614" y="282" width="546" height="70" rx="12" fill="#ffffff"/>
    <rect x="614" y="282" width="10" height="70" rx="5" fill="#bc4c00"/>
    <text x="640" y="312" font-size="16" font-weight="700" fill="#bc4c00">Threat Protection</text>
    <text x="640" y="336" font-size="13" fill="#33445a">Defender for Cloud · Microsoft Sentinel · Defender XDR</text>
  </g>

  <!-- Microsoft column -->
  <g filter="url(#gsh)">
    <rect x="40" y="386" width="546" height="270" rx="12" fill="#ffffff"/>
    <rect x="40" y="386" width="546" height="40" rx="12" fill="#0067b8"/>
    <rect x="40" y="410" width="546" height="16" fill="#0067b8"/>
    <text x="60" y="412" font-size="16" font-weight="700" fill="#ffffff">Microsoft / Azure Services</text>
    <text x="60" y="452" font-size="13" fill="#33445a">Identity: Microsoft Entra ID, Conditional Access, PIM</text>
    <text x="60" y="478" font-size="13" fill="#33445a">Network: Private Endpoints, Azure Firewall, Front Door WAF</text>
    <text x="60" y="504" font-size="13" fill="#33445a">Data: Azure Key Vault, Microsoft Purview, encryption</text>
    <text x="60" y="530" font-size="13" fill="#33445a">Threat: Defender for Cloud, Sentinel (SIEM/SOAR)</text>
    <text x="60" y="556" font-size="13" fill="#33445a">Governance: Azure Policy, Management Groups, RBAC</text>
    <text x="60" y="582" font-size="13" fill="#33445a">Landing Zones: Azure Landing Zone, Blueprints</text>
    <text x="60" y="608" font-size="13" fill="#33445a">Compliance: Compliance Manager, Service Trust Portal</text>
    <text x="60" y="634" font-size="13" fill="#33445a">Cost: Microsoft Cost Management + Budgets</text>
  </g>

  <!-- GitHub column -->
  <g filter="url(#gsh)">
    <rect x="614" y="386" width="546" height="270" rx="12" fill="#ffffff"/>
    <rect x="614" y="386" width="546" height="40" rx="12" fill="#24292f"/>
    <rect x="614" y="410" width="546" height="16" fill="#24292f"/>
    <text x="634" y="412" font-size="16" font-weight="700" fill="#ffffff">GitHub Services</text>
    <text x="634" y="452" font-size="13" fill="#33445a">Code scanning: CodeQL, third-party SARIF</text>
    <text x="634" y="478" font-size="13" fill="#33445a">Secret scanning + push protection</text>
    <text x="634" y="504" font-size="13" fill="#33445a">Supply chain: Dependabot, dependency review</text>
    <text x="634" y="530" font-size="13" fill="#33445a">Governance: branch protection, rulesets, CODEOWNERS</text>
    <text x="634" y="556" font-size="13" fill="#33445a">Access: SAML SSO, teams, fine-grained PATs</text>
    <text x="634" y="582" font-size="13" fill="#33445a">Actions security: OIDC, environments, required reviewers</text>
    <text x="634" y="608" font-size="13" fill="#33445a">Audit: organization audit log, security overview</text>
    <text x="634" y="634" font-size="13" fill="#33445a">Integrity: artifact attestations, signed commits</text>
  </g>
</svg>
