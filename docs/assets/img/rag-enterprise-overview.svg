<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#004a99"/>
    </marker>
    <marker id="arrs" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7ba9d6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="#f7fafd" rx="14"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="46" fill="#003366" rx="14"/>
  <rect x="0" y="32" width="960" height="14" fill="#003366"/>
  <text x="480" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle">Enterprise RAG — How It Works</text>

  <!-- Pipeline boxes -->

  <!-- User -->
  <rect x="20" y="68" width="100" height="76" rx="8" fill="#526072"/>
  <text x="70" y="102" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">User</text>
  <text x="70" y="120" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Question</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="106" x2="150" y2="106" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Front Door + WAF -->
  <rect x="150" y="55" width="130" height="102" rx="8" fill="#004a99"/>
  <text x="215" y="92" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Front Door</text>
  <text x="215" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">+ WAF</text>
  <text x="215" y="132" font-family="Arial, sans-serif" font-size="10" fill="#7ba9d6" text-anchor="middle">Auth · DDoS · OWASP</text>

  <!-- Arrow 2 -->
  <line x1="280" y1="106" x2="310" y2="106" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Orchestrator -->
  <rect x="310" y="55" width="130" height="102" rx="8" fill="#003366"/>
  <text x="375" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Orchestrator</text>
  <text x="375" y="114" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Azure Function</text>
  <text x="375" y="132" font-family="Arial, sans-serif" font-size="10" fill="#7ba9d6" text-anchor="middle">Managed Identity</text>

  <!-- Arrow 3 -->
  <line x1="440" y1="106" x2="470" y2="106" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AI Search -->
  <rect x="470" y="56" width="135" height="50" rx="7" fill="#004a99"/>
  <text x="537" y="78" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Azure AI Search</text>
  <text x="537" y="96" font-family="Arial, sans-serif" font-size="10" fill="#c8d8ea" text-anchor="middle">Vector · Keyword · Hybrid</text>

  <!-- Azure OpenAI -->
  <rect x="470" y="118" width="135" height="50" rx="7" fill="#003366"/>
  <text x="537" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Azure OpenAI</text>
  <text x="537" y="158" font-family="Arial, sans-serif" font-size="10" fill="#c8d8ea" text-anchor="middle">Grounded Response</text>

  <!-- Cosmos DB (lighter) -->
  <rect x="470" y="180" width="135" height="40" rx="7" fill="rgba(0,74,153,0.25)" stroke="#7ba9d6" stroke-width="1"/>
  <text x="537" y="204" font-family="Arial, sans-serif" font-size="11" fill="#243447" text-anchor="middle">Cosmos DB — History</text>

  <!-- Arrow 4 -->
  <line x1="605" y1="106" x2="635" y2="106" stroke="#004a99" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Response / Answer -->
  <rect x="635" y="68" width="100" height="76" rx="8" fill="#526072"/>
  <text x="685" y="102" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Answer</text>
  <text x="685" y="120" font-family="Arial, sans-serif" font-size="11" fill="#c8d8ea" text-anchor="middle">Grounded</text>

  <!-- Monitoring label (top right) -->
  <rect x="750" y="56" width="190" height="66" rx="7" fill="rgba(200,216,234,0.2)" stroke="#c8d8ea" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="845" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#526072" text-anchor="middle">Observability</text>
  <text x="845" y="96" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">Azure Monitor · Sentinel</text>
  <text x="845" y="112" font-family="Arial, sans-serif" font-size="11" fill="#526072" text-anchor="middle">App Insights · Log Analytics</text>

  <!-- Enterprise band at bottom -->
  <rect x="20" y="238" width="284" height="62" rx="9" fill="#004a99"/>
  <text x="162" y="261" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Zero Trust Architecture</text>
  <text x="162" y="280" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Security · Identity · Network</text>

  <rect x="318" y="238" width="284" height="62" rx="9" fill="#003366"/>
  <text x="460" y="261" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Cloud Adoption Framework</text>
  <text x="460" y="280" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Governance · Strategy · Landing Zone</text>

  <rect x="616" y="238" width="324" height="62" rx="9" fill="#003878"/>
  <text x="778" y="261" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Well-Architected Framework</text>
  <text x="778" y="280" font-family="Arial, sans-serif" font-size="11" fill="#b8d0ec" text-anchor="middle">Reliability · Cost · Performance · Ops</text>
</svg>
